participants:
  - cl_type: lighthouse
    cl_image: lighthouse:local
    el_type: geth
    el_image: ethpandaops/geth:fusaka-devnet-1
    cl_extra_params:
      - --subscribe-all-data-column-subnets
      - --subscribe-all-subnets
      # Enable detailed metrics
      - --metrics
      - --metrics-address=0.0.0.0
      - --metrics-port=5054
      # Enable debug logging for network activity
      - --debug-level=debug
      - --target-peers=3
    count: 4
network_params:
  electra_fork_epoch: 0
  fulu_fork_epoch: 1
  seconds_per_slot: 6
snooper_enabled: true
global_log_level: debug
additional_services:
  - prometheus_grafana
  - spamoor
spamoor_params:
  spammers:
    - scenario: blobs
      config:
        throughput: 10